# 自动部署到 GitHub Pages
name: Deploy to GitHub Pages

# 触发条件：推送到 main 分支，或者手动触发
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 代码检查
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # 构建任务
  build:
    needs: lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SELF_HOSTED_TURN_URLS: ${{ secrets.SELF_HOSTED_TURN_URLS }}
          VITE_SELF_HOSTED_TURN_USERNAME: ${{ secrets.SELF_HOSTED_TURN_USERNAME }}
          VITE_SELF_HOSTED_TURN_CREDENTIAL: ${{ secrets.SELF_HOSTED_TURN_CREDENTIAL }}
          VITE_METERED_TURN_USERNAME: ${{ secrets.METERED_TURN_USERNAME }}
          VITE_METERED_TURN_CREDENTIAL: ${{ secrets.METERED_TURN_CREDENTIAL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
